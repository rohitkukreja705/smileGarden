name: Build Installable APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.7'

      # Using the globally-installed "gradle" command instead of ./gradlew,
      # so this works even without a committed gradle-wrapper.jar binary.
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmileGarden-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
